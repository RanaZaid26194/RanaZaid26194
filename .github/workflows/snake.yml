name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: RanaZaid26194
          outputs: |
            dist/github-contribution-grid-snake-light.svg?color_snake=%230d9488&color_dots=%23ebedf0,%23fecaca,%23fca5a5,%23f87171,%23b91c1c
            dist/github-contribution-grid-snake-dark.svg?color_snake=%232dd4bf&color_dots=%23161b22,%237f1d1d,%23991b1b,%23dc2626,%23f87171
            dist/github-contribution-grid-snake.gif?color_snake=%232dd4bf&color_dots=%23161b22,%237f1d1d,%23991b1b,%23dc2626,%23f87171&color_background=%230d1117

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}