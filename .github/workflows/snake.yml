name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: RanaZaid26194
          outputs: |
            dist/github-contribution-grid-snake-light.svg?color_snake=%230d9488&color_dots=%23ebedf0,%23b2f5ea,%235eead4,%232dd4bf,%230f766e
            dist/github-contribution-grid-snake-dark.svg?color_snake=%232dd4bf&color_dots=%23161b22,%230f3d38,%23115e56,%2314b8a6,%232dd4bf
            dist/github-contribution-grid-snake.gif?color_snake=%232dd4bf&color_dots=%23161b22,%230f3d38,%23115e56,%2314b8a6,%232dd4bf&color_background=%230d1117
    
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
