name: Generate Streak Stats

on:
  schedule:
    - cron: "0 3 * * *"   # once a day at 03:00 UTC
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/streak-stats.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats (custom slim-bar fork)
        uses: RanaZaid26194/Forked-github-readme-streak-stats@main
        with:
          options: user=RanaZaid26194&hide_border=true&background=0D1117&ring=2DD4BF&fire=2DD4BF&currStreakLabel=2DD4BF&sideLabels=C9D1D9&currStreakNum=C9D1D9&sideNums=C9D1D9&dates=8B949E
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update streak stats" || exit 0
          git push
